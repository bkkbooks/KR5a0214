front:
  text: 二燈儀同卷爲七
  hash: sha256:a13ae88710147a14d8ba7872b88f3e4777ccfee893678dab119cef0c5a769944
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0214_SJB_000-030591c, image: sjb/03/030591c.png}
body:
  text: 黄籙破獄燈儀黃籙五苦輪燈儀黃籙破獄燈儀法事如式伏以太極太虚眞人曰隂陽成象天地分形晝夜旣殊昏明有異所以清浮表質九天爲先聖之都濁厚流形九地爲鬼神之府九天之上隂炁都消九地之下陽光永隔由是幽冥之界無復光明當晝景之時猶如重霧及昏暝之後更甚隂霾長夜冥冥無由開曉致有沉淪北府受報酆都不覩光明動經億劫是故天尊以無上道力發廣大慈悲然九獄之神燈救重泉之苦爽靈光下燭焕明北府之昏衢和氣潜臻解釋丘寒之冰浦登命三官九府百二十曹五帝考官巨天力士同禀教戒㧞度亡魂莫不稽首歸依恭承慈訓即得風雷靜息桐柱停閑火燄風刀擁蓮花而布甘露冰㦸霜刄化琪樹而變騫林咸隨果以受生俱廻心而嚮道一空地獄冥司無留滯之𡨚共上天堂仙路有超昇之果福霑幽顯慶及後昆功德巍巍稱量莫大敢憑大衆同爲讃揚上元金籙簡文眞仙品格然燈威儀科式至重今齋官某人修建黃籙寳齋兼㸃九幽神燈奉用追薦亡過某人恭以風雷地獄一切冥官廣賜慈悲溥垂開度伏願黒風殄影霹靂停聲戈㦸早息於飄飛肢體不至於分散使其幽扄輝耀地獄澄清㧞度亡魂早超明境謹懴東方風雷地獄之難所有符命謹當告下舉玉寳皇上尊稱揚上徹十方界懴念下達九幽中燈光照耀於東方風雷地獄悉開曉飛戈飄㦸千般苦分散肢體萬種辛承茲懴念並生天覩此燈光生天界和不可思議功德上元金籙簡文眞仙品格然燈威儀科式至重今齋官某人修建黄籙寳齋兼㸃九幽神燈奉用追薦亡過某人恭以銅柱地獄一切冥官廣賜慈悲普垂開度伏願銅鎔柱折火燼灰飛手足得免於躋攀背腹不傷於毫末使其幽扄輝耀地獄澄清㧞度冥魂早超明境謹懴東南方銅柱地獄之難所有符命謹當告下舉好生度命尊以今稱讃天尊號尋聲救苦九幽中燈光相續照東南銅柱地獄悉開解所有銅柱大火焰並令停焰獲清涼承茲照燭出幽扄面覩天尊受快樂和不可思議功徳上元金籙簡文眞仙品格然燈威儀科式至重今齋官某人修建黄籙寳齋兼㸃九幽神燈奉用追薦亡過某人恭以火翳地獄一切冥官廣賜慈悲俯垂開度伏願火山息焰炎檻停酸吞鐵變成蓮花食炭化爲甘露使其幽扄輝耀地獄澄清㧞度幽魂早超明境謹懴南方火翳地獄之難所有符命謹當告下舉玄眞萬福尊聲聲上徹三清境句句下達九幽中燈光照耀於南方火翳地獄消猛焰所有風刀吞火苦變作蓮花甘露漿承兹懴念並生天覩此燈光皆離苦和不可思議功德上元金籙簡文眞仙品格然燈威儀科式至重今齋官某人修建黃籙寳齋兼㸃九幽神燈奉用追薦亡過某人形魂恭以屠割地獄一切冥官廣賜慈悲普垂開度伏願倒懸解脫萬刄消磨三魂清爽於五宫七魄俱全於四體使其幽扄輝耀地獄澄清㧞度冥魂早生明境謹懴西南方屠割地獄之難所有符命謹當告下舉太靈虚皇尊稱揚徧滿十方界天上地下咸使聞燈光相照於西南屠割地獄悉開解刀劔割體非堪忍萬劫受苦無出期燈光普照出幽冥一切窮魂生天境和不可思議功德上元金籙簡文眞仙品格然燈威儀科式至重今齋官某人修建黃籙寳齋兼點九幽神燈奉用追薦亡過某人形魂恭以金剛地獄一切冥官廣賜慈悲普垂開度伏願金鎚毀鑠鐵杖銷鎔魂儀盡得於保全肢體不致於零落使其幽扄輝耀地獄澄清㧞度冥魂早超明境謹懴西方金剛地獄之難所有符命謹當告下舉太妙至極尊志心徧禮十方界㝷聲救苦大慈尊接引燈光向西方金剛地獄悉搉解所有金鎚鐵杖難承茲道力盡皆停天尊救苦㧞隂關隨願往生諸天界和不可思議功德上元金籙簡文眞仙品格然燈威儀科式至重今齋官某人修建黄籙寳齋兼㸃九幽神燈奉用追薦亡過某人形魂恭以火車地獄一切冥官廣賜慈悲普垂開度伏願五車輪脫猛火炎銷冥官大賜於慈悲亡者普昇於快樂使其幽扄輝耀地獄澄清㧞度亡魂早超明境謹懴西北方火車地獄之難所有符命謹當告下舉無量太華尊歸依信禮三界上九幽㧞罪無量尊引兹燈燭破昏冥火車地獄停輪轉五車裂體四肢散一一車輪兵刃隨如斯萬劫受辛酸覩此燈光皆解脫和不可思議功德上元金籙簡文眞仙品格然燈威儀科式至重今齋官某人修建黄籙寳齋兼㸃九幽神燈奉用追薦亡過某人形魂恭以溟泠地獄一切冥官廣賜慈悲普垂開度伏願寒池温燠霜刃銷摧沉淪盡沐於超昇凍餒咸資於飽暖使其幽扄輝耀地獄澄清㧞度亡魂早超明境謹懴北方溟泠地獄之難所有符命謹當告下舉玄上玉晨尊歸命普告三清境慈悲應感救苦尊覩此燈光照北方溟泠地獄緫消釋所有寒冰諸罪苦願聞聖號悉停酸天尊哀憫救群迷早覩燈光生淨境和不可思議功德上元金籙簡文眞仙品格然燈威儀科式至重今齋官某人修建黄籙寳齋兼㸃九幽神燈奉用追薦亡過某人形魂恭以鑊湯地獄一切冥官廣賜慈悲普垂開度伏願眞君降福獄主儲祥鑊湯變作清涼鼎沸化爲甘露使其幽扄輝耀地獄澄清㧞度冥魂早超明境謹懴東北方鑊湯地獄之難所有符命謹當告下舉度仙上聖尊稽首歸依大羅境隨機赴感元始尊不捨慈悲降道場引此燈光照東北鑊湯煑漬願停沸四肢爛潰得完全天尊慈憫救群迷覩此燈光生天界和不可思議功德上元金籙簡文眞仙品格然燈威儀科式至重今齋官某人修建黃籙寳齋兼㸃九幽神燈奉用追薦亡過某人形魂恭以普掠地獄一切冥官廣賜慈悲普垂開度伏願鞭箠永息拷掠常停魂儀勿落於刀山身體不掛於劒鍔使其幽扄輝耀地獄澄清㧞度冥魂早超明境謹懴中央普掠地獄之難所有符命謹當告下舉上下方救苦尊一心皈命十方界尋聲赴感救苦尊引此燈光照中央普掠地獄悉開解所有鞭箠諸罪垢願聞聖號悉消除天尊哀憫救群迷一切冥魂生天界和不可思議功德諷經向來回向伏以神燈照耀九獄開明三天啓拯拔之門衆聖降慈悲之澤向來關讃神燈伏願乗此功德解脫牢關萬罪祛除百神來衛九天仙樂迎歸妙化之堂三洞靈旛導引超生之路仰憑道力爲上良縁念太乙救苦天尊無量不可思議功德黃籙破獄燈儀終
